name: Daily AI & Tech Digest

on:
  schedule:
    # 9:00 AM Karachi time = 4:00 AM UTC  (UTC+5)
    # Change the hour below if you want a different time
    - cron: '0 4 * * *'

  # Lets you trigger it manually from GitHub Actions tab anytime
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest script
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python digest.py
