events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    server {
        listen 8080;
        server_name _;

        # Docker internal DNS — resolves at request time, not at startup
        resolver 127.0.0.11 valid=10s ipv6=off;

        # ── Serve built React static files ─────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        # ── Proxy /api/* → FastAPI backend ─────────────────────────────────
        # Using a variable for proxy_pass forces nginx to resolve at request time.
        # Combined with lua_module or map: simplest working approach is:
        # set variable = host only, then build full URL in proxy_pass.
        location ~ ^/api/(.*)$ {
            set $backend_host "backend";
            proxy_pass         http://$backend_host:8000/$1$is_args$args;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # SPA fallback — all non-API, non-file routes go to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
