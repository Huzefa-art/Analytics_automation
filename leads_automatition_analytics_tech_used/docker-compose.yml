version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/venv # Don't sync venv from host
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard-app:/app
      - /app/node_modules # Don't sync node_modules from host
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://nginx:80

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  # ------------------------------------------------
  # Ngrok – automatically exposes the app via a permanent static public URL
  # ------------------------------------------------
  tunnel:
    image: ngrok/ngrok:latest
    restart: always
    depends_on:
      - nginx
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http nginx:80 --domain=${NGROK_DOMAIN}

networks:
  default:
    driver: bridge
