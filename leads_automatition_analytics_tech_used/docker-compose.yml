services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    volumes:
      - .:/app
      - /app/venv
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    expose:
      - "8000"
    networks:
      - app_net

  # ── Nginx (serves frontend static files + proxies /api to backend) ──────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dashboard-app/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - app_net

  # ── Ngrok tunnel (exposes port 80 to the internet) ──────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    restart: always
    depends_on:
      - nginx
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http nginx:80
    ports:
      - "4040:4040"
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
